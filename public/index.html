<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App - PM Accelerator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Weather App</h1>
    </header>

    <section class="search-section">
      <h2>Search Weather</h2>
      <form id="searchForm">
        <div class="form-row">
          <div class="form-group">
            <label for="country">Country</label>
            <select id="country" name="country" required>
              <option value="">Select Country</option>
            </select>
          </div>
          <div class="form-group">
            <label for="city">City</label>
            <select id="city" name="city" required>
              <option value="">Select Country First</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="date_from">From Date</label>
          <input type="date" id="date_from" name="date_from" required>
        </div>
        <div class="form-group">
          <label for="date_to">To Date</label>
          <input type="date" id="date_to" name="date_to" required>
        </div>
        <button type="submit" class="btn-primary">Get Weather</button>
      </form>
      <div id="message" class="message"></div>
    </section>

    <section id="result" class="result-section" style="display: none;">
      <h2>Weather Result</h2>

      <div class="weather-card">
        <div class="weather-main">
          <div class="weather-header">
            <img id="res-icon" src="" alt="Weather icon">
            <div class="temp-badge" id="temp-badge">
              <span class="temp-badge-emoji" id="temp-badge-emoji"></span>
              <span class="temp-badge-label" id="temp-badge-label"></span>
            </div>
          </div>
          <h3 id="res-location"></h3>
          <p id="res-description" class="weather-desc"></p>
          <p class="temperature"><span id="res-temp"></span>°C</p>
          <p class="current-weather-note">Current conditions</p>
        </div>
        <div class="weather-details">
          <p><strong>Humidity:</strong> <span id="res-humidity"></span>%</p>
          <p><strong>Wind:</strong> <span id="res-wind"></span> m/s</p>
          <p><strong>Pressure:</strong> <span id="res-pressure"></span> hPa</p>
          <p><strong>Search Period:</strong> <span id="res-dates"></span></p>
        </div>
        <div class="external-links">
          <a id="res-maps" href="#" target="_blank" class="btn-secondary">View on Google Maps</a>
          <a id="res-youtube" href="#" target="_blank" class="btn-secondary">Watch on YouTube</a>
        </div>
      </div>

      <div id="forecast-warning" class="forecast-warning" style="display: none;"></div>

      <div id="forecast-section" class="forecast-section" style="display: none;">
        <h3>Forecast</h3>
        <div id="forecast-container" class="forecast-container"></div>
        <button id="show-more-btn" class="btn-secondary" style="display: none; margin-top: 16px;">Show More</button>
      </div>
    </section>

    <section class="saved-section">
      <h2>Saved Searches</h2>
      <div id="savedList" class="saved-list"></div>
    </section>

    <section class="export-section">
      <h2>Export Data</h2>
      <div class="export-buttons">
        <button onclick="exportData('json')" class="btn-secondary">Export JSON</button>
        <button onclick="exportData('csv')" class="btn-secondary">Export CSV</button>
        <button onclick="exportData('xml')" class="btn-secondary">Export XML</button>
        <button onclick="exportData('pdf')" class="btn-secondary">Export PDF</button>
        <button onclick="exportData('markdown')" class="btn-secondary">Export Markdown</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
